<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 7 Archive - Aero Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Použitie tvojho konkrétneho obrázka */
            background: url('obrazok.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* Navigačná lišta v štýle Aero */
        nav {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.3);
        }

        /* Hlavný sklenený panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        /* Aero odlesk navrchu */
        .glass-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        h1 { font-weight: 300; font-size: 2.8em; margin-top: 0; }

        .btn-download {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(180deg, #74c2ff 0%, #3a8ed5 50%, #1e62b5 51%, #2b8add 100%);
            border: 1px solid #0a3d70;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), 0 4px 8px rgba(0,0,0,0.3);
            font-size: 1.2em;
        }

        .btn-download:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">HOME</a>
        <a href="#download">DOWNLOAD</a>
        <a href="#about">O PROJEKTE</a>
    </nav>

    <div class="glass-panel" id="home">
        <h1>Aero7</h1>
        <p>"Your ultimate nostalgic setup hub."</p>
        
        <div id="download">
            <p>"Get the latest pack featuring icons, sounds, and Aero effects."</p>
            <a href="#" class="btn-download">Download PACK</a>
        </div>

        <p class="footer-text">"Designed with the Frutiger Aero aesthetic in mind."</p>
    </div>

</body>
</html>
